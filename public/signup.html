<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب </title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7ff 0%, #e8ecff 50%, #f0f3ff 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(255,255,240,0.8) 0%, rgba(248,245,255,0.9) 100%);
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      z-index: 0;
      animation: floatBlob 20s infinite ease-in-out;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #c7b9ff, #e0d5ff);
      top: -150px;
      right: -150px;
    }

    .blob-2 {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, #ffd9e8, #ffe6f0);
      bottom: -100px;
      left: -100px;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      margin: 20px;
      animation: slideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pure-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 48px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(156, 163, 175, 0.05);
      transition: all 0.4s ease;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #ffffff, #f8faff);
      border-radius: 28px;
      margin-bottom: 24px;
      box-shadow: 0 12px 24px -8px rgba(99, 102, 241, 0.12);
    }

    .icon-wrapper i {
      font-size: 44px;
      background: linear-gradient(145deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header h1 {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(145deg, #1e1b4b, #312e81);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .header p {
      color: #6b7280;
      font-size: 16px;
      font-weight: 500;
    }

    .field {
      margin-bottom: 28px;
      position: relative;
    }

    .field-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      background: #ffffff;
      border: 2px solid #e9eaf0;
      border-radius: 24px;
      outline: none;
      color: #1f2937;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .field-input:focus {
      border-color: #818cf8;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.1);
    }

    .field-label {
      position: absolute;
      right: 20px;
      top: 16px;
      font-size: 15px;
      color: #9ca3af;
      font-weight: 500;
      pointer-events: none;
      transition: all 0.2s ease;
      background: white;
      padding: 0 6px;
    }

    .field-input:focus ~ .field-label,
    .field-input:not(:placeholder-shown) ~ .field-label {
      top: -12px;
      right: 16px;
      font-size: 12px;
      color: #6366f1;
      font-weight: 700;
      background: white;
    }

    .field-input::placeholder {
      color: transparent;
    }

    .field-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #cbd5e1;
      transition: color 0.3s;
      cursor: pointer;
    }

    .btn-primary {
      width: 100%;
      padding: 18px 24px;
      background: linear-gradient(145deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 32px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 32px 0 24px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px -4px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px -6px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .footer-links {
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      font-weight: 500;
    }

    .footer-links a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 700;
      margin-right: 8px;
    }

    .footer-links a:hover {
      color: #4f46e5;
    }

    .password-strength {
      margin-top: 8px;
      height: 4px;
      border-radius: 4px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
      border-radius: 4px;
    }

    .strength-text {
      font-size: 11px;
      margin-top: 6px;
      text-align: left;
      color: #9ca3af;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: white;
      backdrop-filter: blur(16px);
      padding: 14px 28px;
      border-radius: 60px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
      font-weight: 600;
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 14px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 550px) {
      .pure-card { padding: 32px 24px; }
      .header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <div class="pure-card">
      <div class="header">
        <div class="icon-wrapper">
          <i class="fas fa-star-of-life"></i>
        </div>
        <h1>ابدأ رحلتك</h1>
        <p>انضم إلى مجتمعنا المميز اليوم</p>
      </div>

      <form id="registerForm">
        <div class="field">
          <input type="text" id="username" class="field-input" placeholder=" " autocomplete="off">
          <label class="field-label">اسم المستخدم</label>
          <i class="fas fa-user field-icon"></i>
        </div>

        <div class="field">
          <input type="email" id="email" class="field-input" placeholder=" " autocomplete="off">
          <label class="field-label">البريد الإلكتروني</label>
          <i class="fas fa-envelope field-icon"></i>
        </div>

        <div class="field">
          <input type="password" id="password" class="field-input" placeholder=" ">
          <label class="field-label">كلمة المرور</label>
          <i class="fas fa-lock field-icon" id="togglePassword" style="cursor: pointer;"></i>
        </div>
        <div class="password-strength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText">أدخل كلمة مرور قوية</div>

        <div class="field">
          <input type="password" id="confirmPwd" class="field-input" placeholder=" ">
          <label class="field-label">تأكيد كلمة المرور</label>
          <i class="fas fa-check-circle field-icon" id="toggleConfirmPwd" style="cursor: pointer;"></i>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span>إنشاء حساب</span>
          <i class="fas fa-arrow-left"></i>
        </button>

        <div class="footer-links">
          لديك حساب بالفعل؟
          <a href="#" id="loginRedirect">تسجيل الدخول</a>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toastMsg"></div>

  <script>
    // ==========================================
    // 🔑 Firebase Configuration (نفس بيانات login.html)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyB3YATU4fGBL9H_gOzbuMd7b0yk5k9UQlA",
      authDomain: "loginapp-ed6db.firebaseapp.com",
      projectId: "loginapp-ed6db",
      storageBucket: "loginapp-ed6db.firebasestorage.app",
      messagingSenderId: "419177945463",
      appId: "1:419177945463:web:8dbac9ddbb8e60d47be972",
      measurementId: "G-39RX24X1YT"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // DOM elements
    const form = document.getElementById('registerForm');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPwd');
    const submitBtn = document.getElementById('submitBtn');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const toast = document.getElementById('toastMsg');

    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.style.background = isError ? '#fff5f5' : '#f0fdf4';
      toast.style.color = isError ? '#dc2626' : '#059669';
      toast.style.border = isError ? '1px solid #fecaca' : '1px solid #bbf7d0';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Password strength checker
    function checkPasswordStrength(pwd) {
      let strength = 0;
      if (pwd.length >= 6) strength++;
      if (pwd.length >= 10) strength++;
      if (/[A-Z]/.test(pwd)) strength++;
      if (/[0-9]/.test(pwd)) strength++;
      if (/[^A-Za-z0-9]/.test(pwd)) strength++;
      
      const percentage = (strength / 5) * 100;
      strengthBar.style.width = percentage + '%';
      
      if (pwd.length === 0) {
        strengthBar.style.background = '#e5e7eb';
        strengthText.textContent = 'أدخل كلمة مرور قوية';
        strengthText.style.color = '#9ca3af';
        return 0;
      }
      
      if (strength <= 2) {
        strengthBar.style.background = '#ef4444';
        strengthText.textContent = 'ضعيفة';
        strengthText.style.color = '#ef4444';
      } else if (strength <= 3) {
        strengthBar.style.background = '#f59e0b';
        strengthText.textContent = 'متوسطة';
        strengthText.style.color = '#f59e0b';
      } else if (strength <= 4) {
        strengthBar.style.background = '#10b981';
        strengthText.textContent = 'جيدة';
        strengthText.style.color = '#10b981';
      } else {
        strengthBar.style.background = '#059669';
        strengthText.textContent = 'قوية جداً';
        strengthText.style.color = '#059669';
      }
      return strength;
    }

    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirm = document.getElementById('toggleConfirmPwd');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.classList.toggle('fa-lock');
      togglePassword.classList.toggle('fa-unlock-alt');
    });
    
    toggleConfirm.addEventListener('click', () => {
      const type = confirmInput.type === 'password' ? 'text' : 'password';
      confirmInput.type = type;
      toggleConfirm.classList.toggle('fa-check-circle');
      toggleConfirm.classList.toggle('fa-eye-slash');
    });

    passwordInput.addEventListener('input', (e) => {
      checkPasswordStrength(e.target.value);
    });

    function validateEmail(email) {
      const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      return re.test(email);
    }

    // Create account with Firebase
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      
      if (!username || !email || !password || !confirm) {
        showToast('❌ يرجى ملء جميع الحقول', true);
        return;
      }
      
      if (username.length < 3) {
        showToast('👤 اسم المستخدم يجب أن يكون 3 أحرف على الأقل', true);
        return;
      }
      
      if (!validateEmail(email)) {
        showToast('📧 البريد الإلكتروني غير صالح', true);
        return;
      }
      
      if (password.length < 6) {
        showToast('🔒 كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
        return;
      }
      
      if (password !== confirm) {
        showToast('❌ كلمة المرور غير متطابقة', true);
        return;
      }
      
      // Disable button and show loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading-spinner"></div> جاري إنشاء الحساب...';
      
      try {
        // Create user with Firebase
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Update profile with username
        await user.updateProfile({
          displayName: username
        });
        
        showToast(`✨ مرحباً ${username}! تم إنشاء حسابك بنجاح`, false);
        
        // Redirect to login page after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        
      } catch (error) {
        let errorMessage = 'حدث خطأ أثناء إنشاء الحساب';
        if (error.code === 'auth/email-already-in-use') {
          errorMessage = '⚠️ البريد الإلكتروني مسجل مسبقاً';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = '📧 البريد الإلكتروني غير صالح';
        } else if (error.code === 'auth/weak-password') {
          errorMessage = '🔒 كلمة المرور ضعيفة جداً';
        }
        showToast(errorMessage, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>إنشاء حساب</span><i class="fas fa-arrow-left"></i>';
      }
    });
    
    // Login redirect
    document.getElementById('loginRedirect').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'login.html';
    });
    
    // Animate inputs
    const allInputs = document.querySelectorAll('.field-input');
    allInputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'translateX(-2px)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'translateX(0)';
      });
    });
  </script>
</body>
</html>
