<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>إنشاء حساب | Rento</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }

        /* ========================================
           تصميم الكمبيوتر - Rento Style (شاشة منقسمة)
           ======================================== */
        .desktop-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .hero-section {
            flex: 1;
            background: linear-gradient(145deg, #0a0a2a 0%, #0f0f3a 50%, #1a1a4e 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 3rem;
        }

        .hero-section .bg-circle-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: float1 12s ease-in-out infinite;
        }

        .hero-section .bg-circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            bottom: -50px;
            left: -80px;
            border-radius: 50%;
            animation: float2 10s ease-in-out infinite reverse;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40px, 20px) scale(1.2); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 400px;
        }

        .hero-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
        }

        .hero-logo svg {
            width: 45px;
            height: 45px;
            color: white;
        }

        .hero-content h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .hero-content p {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.8;
        }

        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 2rem;
        }

        .form-container {
            max-width: 450px;
            width: 100%;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h2 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* ========================================
           تصميم الهاتف - Plantland Style (نباتات)
           ======================================== */
        .mobile-layout {
            display: none;
            min-height: 100vh;
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            position: relative;
            overflow: hidden;
        }

        .mobile-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            z-index: 0;
        }

        .tree {
            position: absolute;
            bottom: 0;
            left: -50px;
            width: 300px;
            height: 400px;
            opacity: 0.2;
        }

        .tree .trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 30px;
            height: 150px;
            background: #5d4037;
            border-radius: 10px;
            transform: translateX(-50%);
        }

        .tree .branches {
            position: absolute;
            bottom: 120px;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translateX(-50%);
        }

        .tree .branches::before,
        .tree .branches::after {
            content: '';
            position: absolute;
            background: #2e7d32;
            border-radius: 50%;
        }

        .tree .branches::before {
            width: 80px;
            height: 80px;
            top: 20px;
            left: -40px;
        }

        .tree .branches::after {
            width: 100px;
            height: 100px;
            top: -10px;
            right: -30px;
        }

        .plant {
            position: absolute;
            bottom: 0;
            width: 60px;
            height: 80px;
        }

        .plant-1 { right: 20px; }
        .plant-2 { right: 100px; bottom: -10px; width: 50px; }
        .plant-3 { left: 80px; bottom: 20px; width: 70px; }

        .plant .stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 40px;
            background: #5d4037;
            transform: translateX(-50%);
        }

        .plant .leaf {
            position: absolute;
            background: #388e3c;
            border-radius: 50% 0 50% 0;
            transform: rotate(45deg);
        }

        .floating-leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #66bb6a;
            border-radius: 0 50% 0 50%;
            transform: rotate(45deg);
            opacity: 0.3;
            animation: leafFloat 15s infinite linear;
        }

        @keyframes leafFloat {
            0% { transform: rotate(45deg) translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: rotate(135deg) translateY(-100px) translateX(50px); opacity: 0.6; }
            100% { transform: rotate(225deg) translateY(-200px) translateX(100px); opacity: 0; }
        }

        .mobile-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            margin: 1rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: calc(100% - 2rem);
            max-width: 400px;
        }

        .mobile-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2e7d32, #43a047);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .mobile-logo svg {
            width: 38px;
            height: 38px;
            color: white;
        }

        .mobile-card h2 {
            font-size: 1.6rem;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .mobile-card .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        /* ========================================
           العناصر المشتركة (الحقول)
           ======================================== */
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .input-group input:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-group label {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            pointer-events: none;
            transition: all 0.2s ease;
            background: transparent;
            padding: 0 0.25rem;
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 0;
            transform: translateY(-50%) scale(0.85);
            background: white;
            color: #6366f1;
            right: 0.8rem;
        }

        .input-group input::placeholder {
            color: transparent;
        }

        .input-group .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s;
        }

        .input-group input:focus ~ .icon {
            color: #6366f1;
        }

        .password-strength {
            margin-top: 5px;
            height: 4px;
            border-radius: 4px;
            background: #e2e8f0;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }

        .strength-text {
            font-size: 0.7rem;
            margin-top: 5px;
            text-align: left;
            color: #94a3b8;
        }

        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 700;
        }

        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            z-index: 1000;
            transition: bottom 0.3s;
        }

        .toast.show {
            bottom: 30px;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .desktop-layout { display: none; }
            .mobile-layout { display: flex; align-items: center; justify-content: center; }
        }

        @media (min-width: 769px) {
            .desktop-layout { display: flex; }
            .mobile-layout { display: none; }
        }
        
        /* مؤشر تحميل إضافي */
        .overlay-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .overlay-loading.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>

    <!-- Overlay تحميل -->
    <div class="overlay-loading" id="overlayLoading">
        <div class="spinner"></div>
    </div>

    <!-- ========================================
         تصميم الكمبيوتر - Rento Style
    ======================================== -->
    <div class="desktop-layout">
        <div class="hero-section">
            <div class="bg-circle-1"></div>
            <div class="bg-circle-2"></div>
            <div class="hero-content">
                <div class="hero-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Rento</h1>
                <p>منصة متكاملة لإدارة أعمالك<br>بكل سهولة واحترافية</p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2>إنشاء حساب جديد</h2>
                    <p>انضم إلى مجتمعنا المميز اليوم</p>
                </div>

                <form id="signupForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder=" " required>
                        <label>اسم المستخدم</label>
                        <i class="fas fa-user icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label>البريد الإلكتروني</label>
                        <i class="fas fa-envelope icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" placeholder=" " required>
                        <label>كلمة المرور</label>
                        <i class="fas fa-lock icon" id="togglePassword" style="cursor: pointer;"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">أدخل كلمة مرور قوية</div>

                    <div class="input-group">
                        <input type="password" id="confirmPwd" placeholder=" " required>
                        <label>تأكيد كلمة المرور</label>
                        <i class="fas fa-check-circle icon" id="toggleConfirmPwd" style="cursor: pointer;"></i>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span>إنشاء حساب</span>
                        <i class="fas fa-arrow-left"></i>
                    </button>

                    <div class="footer-links">
                        لديك حساب بالفعل؟
                        <a href="#" id="loginRedirect">تسجيل الدخول</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ========================================
         تصميم الهاتف - Plantland Style
    ======================================== -->
    <div class="mobile-layout">
        <div class="mobile-bg">
            <div class="tree">
                <div class="trunk"></div>
                <div class="branches"></div>
            </div>
            <div class="plant plant-1"><div class="stem"></div><div class="leaf" style="top:-15px; left:-10px; width:25px; height:25px;"></div></div>
            <div class="plant plant-2"><div class="stem"></div><div class="leaf" style="top:-10px; left:-5px; width:20px; height:20px;"></div></div>
            <div class="plant plant-3"><div class="stem" style="height:50px;"></div><div class="leaf" style="top:-20px; left:-12px; width:28px; height:28px;"></div></div>
            <div class="floating-leaf" style="top:20%; left:10%; animation-delay:0s;"></div>
            <div class="floating-leaf" style="top:40%; right:5%; animation-delay:3s; width:15px; height:15px;"></div>
            <div class="floating-leaf" style="top:60%; left:15%; animation-delay:6s; width:12px; height:12px;"></div>
        </div>

        <div class="mobile-card">
            <div class="mobile-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Join our community today</p>

            <form id="mobileSignupForm">
                <div class="input-group">
                    <input type="text" id="mobileUsername" placeholder=" " required>
                    <label>Username</label>
                    <i class="fas fa-user icon"></i>
                </div>

                <div class="input-group">
                    <input type="email" id="mobileEmail" placeholder=" " required>
                    <label>Email Address</label>
                    <i class="fas fa-envelope icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="mobilePassword" placeholder=" " required>
                    <label>Password</label>
                    <i class="fas fa-lock icon" id="mobileTogglePassword" style="cursor: pointer;"></i>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="mobileStrengthBar"></div>
                </div>
                <div class="strength-text" id="mobileStrengthText">Enter a strong password</div>

                <div class="input-group">
                    <input type="password" id="mobileConfirmPwd" placeholder=" " required>
                    <label>Confirm Password</label>
                    <i class="fas fa-check-circle icon" id="mobileToggleConfirmPwd" style="cursor: pointer;"></i>
                </div>

                <button type="submit" class="btn-primary" id="mobileSubmitBtn">
                    <span>Sign Up</span>
                    <i class="fas fa-arrow-left"></i>
                </button>

                <div class="footer-links">
                    Already have an account?
                    <a href="#" id="mobileLoginRedirect">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toastMsg"></div>

    <script>
        // ==========================================
        // 🔑 Firebase Configuration
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB3YATU4fGBL9H_gOzbuMd7b0yk5k9UQlA",
            authDomain: "loginapp-ed6db.firebaseapp.com",
            projectId: "loginapp-ed6db",
            storageBucket: "loginapp-ed6db.firebasestorage.app",
            messagingSenderId: "419177945463",
            appId: "1:419177945463:web:8dbac9ddbb8e60d47be972",
            measurementId: "G-39RX24X1YT"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Toast function
        const toast = document.getElementById('toastMsg');
        const overlayLoading = document.getElementById('overlayLoading');
        let toastTimeout;

        function showToast(message, isError = false) {
            clearTimeout(toastTimeout);
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.style.color = 'white';
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showLoading(show) {
            if (show) {
                overlayLoading.classList.add('active');
            } else {
                overlayLoading.classList.remove('active');
            }
        }

        // Password strength checker
        function checkPasswordStrength(pwd, strengthBar, strengthText, isDesktop = true) {
            let strength = 0;
            if (pwd.length >= 6) strength++;
            if (pwd.length >= 10) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            if (/[^A-Za-z0-9]/.test(pwd)) strength++;
            
            const percentage = (strength / 5) * 100;
            strengthBar.style.width = percentage + '%';
            
            if (pwd.length === 0) {
                strengthBar.style.background = '#e2e8f0';
                strengthText.textContent = isDesktop ? 'أدخل كلمة مرور قوية' : 'Enter a strong password';
                strengthText.style.color = '#94a3b8';
                return 0;
            }
            
            if (strength <= 2) {
                strengthBar.style.background = '#ef4444';
                strengthText.textContent = isDesktop ? 'ضعيفة' : 'Weak';
                strengthText.style.color = '#ef4444';
            } else if (strength <= 3) {
                strengthBar.style.background = '#f59e0b';
                strengthText.textContent = isDesktop ? 'متوسطة' : 'Medium';
                strengthText.style.color = '#f59e0b';
            } else if (strength <= 4) {
                strengthBar.style.background = '#10b981';
                strengthText.textContent = isDesktop ? 'جيدة' : 'Good';
                strengthText.style.color = '#10b981';
            } else {
                strengthBar.style.background = '#059669';
                strengthText.textContent = isDesktop ? 'قوية جداً' : 'Strong';
                strengthText.style.color = '#059669';
            }
            return strength;
        }

        // Toggle password visibility
        function setupTogglePassword(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            if (input && toggle) {
                toggle.addEventListener('click', () => {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    toggle.classList.toggle('fa-lock');
                    toggle.classList.toggle('fa-unlock-alt');
                });
            }
        }

        // ✅ دالة قوية لتسجيل الخروج بشكل مؤكد
        async function forceLogout() {
            try {
                // تسجيل الخروج عدة مرات للتأكد
                await auth.signOut();
                await new Promise(resolve => setTimeout(resolve, 100));
                if (auth.currentUser) {
                    await auth.signOut();
                }
                await new Promise(resolve => setTimeout(resolve, 100));
                if (auth.currentUser) {
                    // محاولة أخيرة
                    await auth.signOut();
                }
            } catch (e) {
                console.log("Logout error:", e);
            }
        }

        // ✅ إنشاء حساب مع تسجيل خروج فوري ومؤكد
        async function createAccountAndForceLogout(email, password, username) {
            // أولاً: التأكد من تسجيل الخروج
            await forceLogout();
            
            // إنشاء الحساب (سيتم تسجيل الدخول تلقائياً)
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: username });
            
            // ✅ انتظار قصير ثم تسجيل الخروج
            await new Promise(resolve => setTimeout(resolve, 50));
            
            // ✅ تسجيل الخروج بشكل قوي ومتكرر
            await forceLogout();
            
            // ✅ انتظار إضافي للتأكد
            await new Promise(resolve => setTimeout(resolve, 100));
            
            // ✅ التأكد النهائي من تسجيل الخروج
            if (auth.currentUser) {
                await auth.signOut();
            }
            
            return userCredential.user;
        }

        // Desktop signup
        const desktopForm = document.getElementById('signupForm');
        const desktopUsername = document.getElementById('username');
        const desktopEmail = document.getElementById('email');
        const desktopPassword = document.getElementById('password');
        const desktopConfirm = document.getElementById('confirmPwd');
        const desktopSubmitBtn = document.getElementById('submitBtn');
        const desktopStrengthBar = document.getElementById('strengthBar');
        const desktopStrengthText = document.getElementById('strengthText');

        setupTogglePassword('password', 'togglePassword');
        setupTogglePassword('confirmPwd', 'toggleConfirmPwd');

        desktopPassword.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value, desktopStrengthBar, desktopStrengthText, true);
        });

        async function validateSignup(username, email, password, confirm, isDesktop = true) {
            if (!username || !email || !password || !confirm) {
                showToast(isDesktop ? '❌ يرجى ملء جميع الحقول' : '❌ Please fill all fields', true);
                return false;
            }
            if (username.length < 3) {
                showToast(isDesktop ? '👤 اسم المستخدم يجب أن يكون 3 أحرف على الأقل' : '👤 Username must be at least 3 characters', true);
                return false;
            }
            if (!email.includes('@')) {
                showToast(isDesktop ? '📧 البريد الإلكتروني غير صالح' : '📧 Invalid email address', true);
                return false;
            }
            if (password.length < 6) {
                showToast(isDesktop ? '🔒 كلمة المرور يجب أن تكون 6 أحرف على الأقل' : '🔒 Password must be at least 6 characters', true);
                return false;
            }
            if (password !== confirm) {
                showToast(isDesktop ? '❌ كلمة المرور غير متطابقة' : '❌ Passwords do not match', true);
                return false;
            }
            return true;
        }

        desktopForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = desktopUsername.value.trim();
            const email = desktopEmail.value.trim();
            const password = desktopPassword.value;
            const confirm = desktopConfirm.value;
            
            const isValid = await validateSignup(username, email, password, confirm, true);
            if (!isValid) return;
            
            desktopSubmitBtn.disabled = true;
            desktopSubmitBtn.innerHTML = '<div class="loading-spinner"></div> جاري إنشاء الحساب...';
            showLoading(true);
            
            try {
                // ✅ استخدام الدالة الجديدة التي تضمن تسجيل الخروج
                await createAccountAndForceLogout(email, password, username);
                
                showToast(`✨ مرحباً ${username}! تم إنشاء حسابك بنجاح. الرجاء تسجيل الدخول`, false);
                
                // ✅ الانتقال إلى صفحة تسجيل الدخول
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                let errorMessage = 'حدث خطأ أثناء إنشاء الحساب';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = '⚠️ البريد الإلكتروني مسجل مسبقاً';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = '📧 البريد الإلكتروني غير صالح';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = '🔒 كلمة المرور ضعيفة جداً';
                }
                showToast(errorMessage, true);
            } finally {
                desktopSubmitBtn.disabled = false;
                desktopSubmitBtn.innerHTML = '<span>إنشاء حساب</span><i class="fas fa-arrow-left"></i>';
                showLoading(false);
            }
        });

        // Mobile signup
        const mobileForm = document.getElementById('mobileSignupForm');
        const mobileUsername = document.getElementById('mobileUsername');
        const mobileEmail = document.getElementById('mobileEmail');
        const mobilePassword = document.getElementById('mobilePassword');
        const mobileConfirm = document.getElementById('mobileConfirmPwd');
        const mobileSubmitBtn = document.getElementById('mobileSubmitBtn');
        const mobileStrengthBar = document.getElementById('mobileStrengthBar');
        const mobileStrengthText = document.getElementById('mobileStrengthText');

        setupTogglePassword('mobilePassword', 'mobileTogglePassword');
        setupTogglePassword('mobileConfirmPwd', 'mobileToggleConfirmPwd');

        mobilePassword.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value, mobileStrengthBar, mobileStrengthText, false);
        });

        mobileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = mobileUsername.value.trim();
            const email = mobileEmail.value.trim();
            const password = mobilePassword.value;
            const confirm = mobileConfirm.value;
            
            const isValid = await validateSignup(username, email, password, confirm, false);
            if (!isValid) return;
            
            mobileSubmitBtn.disabled = true;
            mobileSubmitBtn.innerHTML = '<div class="loading-spinner"></div> Creating account...';
            showLoading(true);
            
            try {
                // ✅ استخدام الدالة الجديدة التي تضمن تسجيل الخروج
                await createAccountAndForceLogout(email, password, username);
                
                showToast(`✨ Welcome ${username}! Account created successfully. Please login`, false);
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                let errorMessage = 'Error creating account';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = '⚠️ Email already registered';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = '📧 Invalid email address';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = '🔒 Password is too weak';
                }
                showToast(errorMessage, true);
            } finally {
                mobileSubmitBtn.disabled = false;
                mobileSubmitBtn.innerHTML = '<span>Sign Up</span><i class="fas fa-arrow-left"></i>';
                showLoading(false);
            }
        });

        // Redirect to login
        document.getElementById('loginRedirect')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'login.html';
        });
        document.getElementById('mobileLoginRedirect')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'login.html';
        });
        
        // ✅ التأكد من تسجيل الخروج عند تحميل الصفحة
        window.addEventListener('load', async () => {
            await forceLogout();
        });
    </script>
</body>
</html>
