<!-- forgot-password.html -->
<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>استعادة كلمة المرور</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- EmailJS -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cairo", sans-serif;
        min-height: 100vh;
      }

      .desktop-layout {
        display: flex;
        min-height: 100vh;
        width: 100%;
      }

      .hero-section {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 3rem;
      }

      .hero-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=800&h=800&fit=crop");
        background-size: cover;
        background-position: center;
        filter: blur(4px);
        transform: scale(1.05);
        z-index: 0;
      }

      .hero-section::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(10, 10, 42, 0.7);
        z-index: 1;
      }

      .hero-section .bg-circle-1,
      .hero-section .bg-circle-2 {
        z-index: 2;
      }

      .hero-content {
        position: relative;
        z-index: 3;
        text-align: center;
        color: white;
        max-width: 400px;
      }

      .hero-section .bg-circle-1 {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.2) 0%,
          transparent 70%
        );
        top: -100px;
        right: -100px;
        border-radius: 50%;
        animation: float1 12s ease-in-out infinite;
      }

      .hero-section .bg-circle-2 {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.15) 0%,
          transparent 70%
        );
        bottom: -50px;
        left: -80px;
        border-radius: 50%;
        animation: float2 10s ease-in-out infinite reverse;
      }

      @keyframes float1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, -30px) scale(1.1);
        }
      }

      @keyframes float2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-40px, 20px) scale(1.2);
        }
      }

      .hero-logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
      }

      .hero-logo svg {
        width: 45px;
        height: 45px;
        color: white;
      }

      .hero-content h1 {
        font-size: 2.8rem;
        font-weight: 800;
        margin-bottom: 1rem;
      }

      .hero-content p {
        font-size: 1rem;
        opacity: 0.8;
        line-height: 1.8;
      }

      .form-section {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        padding: 2rem;
      }

      .form-container {
        max-width: 400px;
        width: 100%;
      }

      .form-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .form-header h2 {
        font-size: 1.8rem;
        color: #1e293b;
        margin-bottom: 0.5rem;
      }

      .form-header p {
        color: #64748b;
        font-size: 0.9rem;
      }

      .input-group {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .input-group input {
        width: 100%;
        padding: 1rem 1rem 1rem 2.8rem;
        font-size: 1rem;
        font-family: "Cairo", sans-serif;
        border: 2px solid #e2e8f0;
        border-radius: 1rem;
        outline: none;
        transition: all 0.3s ease;
        background: #f8fafc;
      }

      .input-group input:focus {
        border-color: #6366f1;
        background: white;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .input-group label {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-weight: 500;
        font-size: 0.95rem;
        pointer-events: none;
        transition: all 0.2s ease;
        background: transparent;
        padding: 0 0.25rem;
      }

      .input-group input:focus ~ label,
      .input-group input:not(:placeholder-shown) ~ label {
        top: 0;
        transform: translateY(-50%) scale(0.85);
        background: white;
        color: #6366f1;
        right: 0.8rem;
      }

      .input-group .icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        transition: color 0.3s;
        font-size: 1.1rem;
      }

      .input-group input:focus ~ .icon {
        color: #6366f1;
      }

      .input-group input::placeholder {
        color: transparent;
      }

      .reset-btn,
      .verify-btn {
        width: 100%;
        padding: 0.9rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        border-radius: 1rem;
        color: white;
        font-size: 1rem;
        font-weight: 700;
        font-family: "Cairo", sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .reset-btn:hover,
      .verify-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
      }

      .reset-btn:disabled,
      .verify-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
        color: #64748b;
        font-size: 0.85rem;
      }

      .back-link a {
        color: #6366f1;
        text-decoration: none;
        font-weight: 700;
      }

      .toast {
        position: fixed;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 0.7rem 1.5rem;
        border-radius: 2rem;
        font-size: 0.85rem;
        z-index: 1000;
        transition: bottom 0.3s;
      }

      .toast.show {
        bottom: 30px;
      }

      .loading-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .step {
        transition: all 0.3s ease;
      }

      .step-hidden {
        display: none;
      }

      .code-input-container {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .code-input {
        width: 50px;
        height: 60px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        border: 2px solid #e2e8f0;
        border-radius: 0.5rem;
        outline: none;
        transition: all 0.3s ease;
      }

      .code-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .resend-code {
        text-align: center;
        margin-top: 1rem;
      }

      .resend-code a {
        color: #6366f1;
        text-decoration: none;
        font-size: 0.85rem;
        cursor: pointer;
      }

      /* نافذة إعادة تعيين كلمة المرور */
      .reset-password-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        font-family: "Cairo", sans-serif;
      }

      .reset-password-modal .modal-content {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        width: 90%;
        max-width: 400px;
        text-align: center;
      }

      .reset-password-modal h3 {
        margin-bottom: 1rem;
        color: #1e293b;
      }

      .reset-password-modal p {
        margin-bottom: 1rem;
        color: #64748b;
      }

      .reset-password-modal input {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid #e2e8f0;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        font-family: inherit;
        font-size: 1rem;
      }

      .reset-password-modal input:focus {
        outline: none;
        border-color: #6366f1;
      }

      .reset-password-modal .btn-group {
        display: flex;
        gap: 1rem;
      }

      .reset-password-modal .confirm-btn {
        flex: 1;
        padding: 0.8rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
      }

      .reset-password-modal .cancel-btn {
        flex: 1;
        padding: 0.8rem;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
      }

      .reset-password-modal .confirm-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      @media (max-width: 768px) {
        .desktop-layout {
          display: flex;
          flex-direction: column;
        }
        .hero-section {
          min-height: 200px;
          padding: 1rem;
        }
        .hero-section::before {
          filter: blur(2px);
        }
        .hero-content h1 {
          font-size: 1.5rem;
        }
        .hero-logo {
          width: 50px;
          height: 50px;
          margin-bottom: 1rem;
        }
        .hero-logo svg {
          width: 28px;
          height: 28px;
        }
        .form-section {
          padding: 1rem;
        }
        .code-input {
          width: 40px;
          height: 50px;
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="desktop-layout">
      <div class="hero-section">
        <div class="bg-circle-1"></div>
        <div class="bg-circle-2"></div>
        <div class="hero-content">
          
          
        </div>
      </div>

      <div class="form-section">
        <div class="form-container">
          <!-- الخطوة 1: إدخال البريد الإلكتروني -->
          <div id="step1" class="step">
            <div class="form-header">
              <h2>نسيت كلمة المرور؟</h2>
              <p>لا تقلق، سنساعدك على استعادتها</p>
            </div>

            <form id="resetForm">
              <div class="input-group">
                <input type="email" id="resetEmail" placeholder=" " required />
                <label>البريد الإلكتروني</label>
                <i class="fas fa-envelope icon"></i>
              </div>

              <button type="submit" class="reset-btn" id="resetBtn">
                <span>إرسال رمز التحقق</span>
                <i class="fas fa-paper-plane"></i>
              </button>
            </form>
          </div>

          <!-- الخطوة 2: إدخال رمز التحقق -->
          <div id="step2" class="step step-hidden">
            <div class="form-header">
              <h2>رمز التحقق</h2>
              <p>أدخل الرمز الذي تم إرساله إلى بريدك</p>
            </div>

            <div class="code-input-container">
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code1"
                autocomplete="off"
              />
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code2"
                autocomplete="off"
              />
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code3"
                autocomplete="off"
              />
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code4"
                autocomplete="off"
              />
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code5"
                autocomplete="off"
              />
              <input
                type="text"
                maxlength="1"
                class="code-input"
                id="code6"
                autocomplete="off"
              />
            </div>

            <button class="verify-btn" id="verifyBtn">
              <span>التحقق من الرمز</span>
              <i class="fas fa-check"></i>
            </button>

            <div class="resend-code">
              <a id="resendCode">لم يصلك الرمز؟ إعادة الإرسال</a>
            </div>
          </div>

          <div class="back-link">
            <a href="login.html">← العودة إلى تسجيل الدخول</a>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toastMsg"></div>

    <script>
      // ========== إعدادات Firebase ==========
      const firebaseConfig = {
        apiKey: "AIzaSyB3YATU4fGBL9H_gOzbuMd7b0yk5k9UQlA",
        authDomain: "loginapp-ed6db.firebaseapp.com",
        projectId: "loginapp-ed6db",
        storageBucket: "loginapp-ed6db.firebasestorage.app",
        messagingSenderId: "419177945463",
        appId: "1:419177945463:web:8dbac9ddbb8e60d47be972",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // ========== إعدادات EmailJS ==========
      emailjs.init("C3d_kJF5cpnFTVFl_"); // Public Key

      const SERVICE_ID = "service_1ydy6ge";
      const TEMPLATE_ID = "template_jdhqkc4";

      // ========== متغيرات الصفحة ==========
      const toast = document.getElementById("toastMsg");
      const resetForm = document.getElementById("resetForm");
      const resetEmail = document.getElementById("resetEmail");
      const resetBtn = document.getElementById("resetBtn");
      const step1 = document.getElementById("step1");
      const step2 = document.getElementById("step2");
      const verifyBtn = document.getElementById("verifyBtn");
      const resendCode = document.getElementById("resendCode");

      let currentEmail = "";
      let currentCode = "";
      let codeExpiry = null;
      let toastTimeout;

      function showToast(message, isError = false) {
        clearTimeout(toastTimeout);
        toast.textContent = message;
        toast.style.background = isError ? "#ef4444" : "#10b981";
        toast.classList.add("show");
        toastTimeout = setTimeout(() => {
          toast.classList.remove("show");
        }, 4000);
      }

      // إنشاء رمز عشوائي من 6 أرقام
      function generateVerificationCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
      }

      // إرسال البريد باستخدام EmailJS
      async function sendVerificationEmail(email, code) {
        try {
          const templateParams = {
            to_email: email,
            to_name: email.split("@")[0],
            code: code,
          };

          const response = await emailjs.send(
            SERVICE_ID,
            TEMPLATE_ID,
            templateParams
          );
          console.log("تم الإرسال بنجاح:", response);
          return true;
        } catch (error) {
          console.log("خطأ في الإرسال:", error);
          // في حالة فشل EmailJS، استخدم الطريقة البديلة
          const subject = "رمز التحقق - استعادة كلمة المرور";
          const body = `مرحباً،\n\nرمز التحقق الخاص بك هو: ${code}\n\nهذا الرمز صالح لمدة 5 دقائق.\n\nإذا لم تطلب هذا الرمز، يرجى تجاهل هذه الرسالة.`;
          window.open(
            `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`
          );
          return true;
        }
      }

      // نافذة إعادة تعيين كلمة المرور
      function showResetPasswordModal() {
        return new Promise((resolve) => {
          const modal = document.createElement("div");
          modal.className = "reset-password-modal";
          modal.innerHTML = `
            <div class="modal-content">
              <h3>إعادة تعيين كلمة المرور</h3>
              <p>أدخل كلمة المرور الجديدة</p>
              <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة" autocomplete="off">
              <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" autocomplete="off">
              <div class="btn-group">
                <button class="confirm-btn" id="confirmResetBtn">تأكيد</button>
                <button class="cancel-btn" id="cancelResetBtn">إلغاء</button>
              </div>
            </div>
          `;

          document.body.appendChild(modal);

          const newPasswordInput = modal.querySelector("#newPassword");
          const confirmPasswordInput = modal.querySelector("#confirmPassword");
          const confirmBtn = modal.querySelector("#confirmResetBtn");
          const cancelBtn = modal.querySelector("#cancelResetBtn");

          const validateAndGetPassword = () => {
            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            if (newPassword.length < 6) {
              showToast("❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل", true);
              return null;
            }

            if (newPassword !== confirmPassword) {
              showToast("❌ كلمة المرور غير متطابقة", true);
              return null;
            }

            return newPassword;
          };

          confirmBtn.onclick = async () => {
            const newPassword = validateAndGetPassword();
            if (newPassword) {
              confirmBtn.disabled = true;
              confirmBtn.innerHTML = '<div class="loading-spinner"></div>';
              modal.remove();
              resolve(newPassword);
            }
          };

          cancelBtn.onclick = () => {
            modal.remove();
            resolve(null);
          };

          // الضغط على Enter
          const inputs = [newPasswordInput, confirmPasswordInput];
          inputs.forEach((input) => {
            input.onkeypress = (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                const newPassword = validateAndGetPassword();
                if (newPassword) {
                  confirmBtn.disabled = true;
                  confirmBtn.innerHTML = '<div class="loading-spinner"></div>';
                  modal.remove();
                  resolve(newPassword);
                }
              }
            };
          });
        });
      }

      // التنقل بين حقول رمز التحقق تلقائياً
      const codeInputs = ["code1", "code2", "code3", "code4", "code5", "code6"];
      codeInputs.forEach((id, index) => {
        const input = document.getElementById(id);
        input.addEventListener("input", (e) => {
          if (e.target.value.length === 1 && index < 5) {
            document.getElementById(codeInputs[index + 1]).focus();
          }
        });
        input.addEventListener("keydown", (e) => {
          if (
            e.key === "Backspace" &&
            e.target.value.length === 0 &&
            index > 0
          ) {
            document.getElementById(codeInputs[index - 1]).focus();
          }
        });
      });

      // إرسال رمز التحقق عبر البريد الإلكتروني
      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = resetEmail.value.trim();

        if (!email.includes("@")) {
          showToast("❌ الرجاء إدخال بريد إلكتروني صحيح", true);
          return;
        }

        resetBtn.disabled = true;
        resetBtn.innerHTML =
          '<div class="loading-spinner"></div> جاري الإرسال...';

        try {
          // إنشاء رمز تحقق
          currentCode = generateVerificationCode();
          currentEmail = email;
          codeExpiry = Date.now() + 5 * 60 * 1000;

          // إرسال الرمز عبر البريد
          await sendVerificationEmail(email, currentCode);

          showToast(`✅ تم إرسال رمز التحقق إلى ${email}`);
          showToast("📧 تحقق من بريدك الإلكتروني");

          // الانتقال إلى الخطوة 2
          step1.classList.add("step-hidden");
          step2.classList.remove("step-hidden");

          // تفريغ حقول الكود
          codeInputs.forEach((id) => {
            document.getElementById(id).value = "";
          });
          
          // التركيز على أول حقل كود
          document.getElementById("code1").focus();
        } catch (error) {
          console.error("خطأ:", error);
          showToast("❌ حدث خطأ. يرجى المحاولة مرة أخرى", true);
        } finally {
          resetBtn.disabled = false;
          resetBtn.innerHTML =
            '<span>إرسال رمز التحقق</span><i class="fas fa-paper-plane"></i>';
        }
      });

      // التحقق من الكود وعرض نافذة إعادة تعيين كلمة المرور
      verifyBtn.addEventListener("click", async () => {
        // جمع الكود من الحقول
        let enteredCode = "";
        codeInputs.forEach((id) => {
          enteredCode += document.getElementById(id).value;
        });

        if (enteredCode.length !== 6) {
          showToast("❌ الرجاء إدخال رمز التحقق المكون من 6 أرقام", true);
          return;
        }

        // التحقق من صلاحية الكود
        if (codeExpiry && Date.now() > codeExpiry) {
          showToast("❌ انتهت صلاحية الرمز. يرجى طلب رمز جديد", true);
          return;
        }

        if (enteredCode !== currentCode) {
          showToast("❌ رمز التحقق غير صحيح", true);
          return;
        }

        verifyBtn.disabled = true;
        verifyBtn.innerHTML =
          '<div class="loading-spinner"></div> جاري التحقق...';

        try {
          // عرض نافذة إدخال كلمة المرور الجديدة
          const newPassword = await showResetPasswordModal();
          
          if (!newPassword) {
            showToast("تم إلغاء العملية");
            verifyBtn.disabled = false;
            verifyBtn.innerHTML =
              '<span>التحقق من الرمز</span><i class="fas fa-check"></i>';
            return;
          }

          // تسجيل الدخول باستخدام البريد الإلكتروني (بدون كلمة مرور)
          // ملاحظة: لا يمكن تغيير كلمة المرور بدون تسجيل الدخول، 
          // لذلك سنستخدم sendPasswordResetEmail كحل آمن
          
          showToast("جاري إعادة تعيين كلمة المرور...");
          
          // إرسال رابط إعادة تعيين كلمة المرور من Firebase
          await auth.sendPasswordResetEmail(currentEmail);
          
          showToast("✅ تم التحقق بنجاح!");
          showToast("📧 تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني");
          showToast("🔐 اتبع الرابط لإعادة تعيين كلمة المرور الجديدة");

          // العودة إلى صفحة تسجيل الدخول بعد 3 ثوان
          setTimeout(() => {
            window.location.href = "login.html";
          }, 3000);
        } catch (error) {
          console.error("خطأ:", error);
          if (error.code === "auth/user-not-found") {
            showToast("❌ لا يوجد حساب مرتبط بهذا البريد الإلكتروني", true);
          } else if (error.code === "auth/invalid-email") {
            showToast("❌ البريد الإلكتروني غير صالح", true);
          } else if (error.code === "auth/too-many-requests") {
            showToast("❌ تم إرسال العديد من الطلبات. يرجى المحاولة لاحقاً", true);
          } else {
            showToast("❌ " + error.message, true);
          }
        } finally {
          verifyBtn.disabled = false;
          verifyBtn.innerHTML =
            '<span>التحقق من الرمز</span><i class="fas fa-check"></i>';
        }
      });

      // إعادة إرسال الرمز
      resendCode.addEventListener("click", async (e) => {
        e.preventDefault();

        if (!currentEmail) {
          showToast("❌ يرجى إدخال البريد الإلكتروني أولاً", true);
          return;
        }

        resendCode.style.pointerEvents = "none";
        resendCode.style.opacity = "0.5";

        try {
          // إنشاء رمز جديد
          currentCode = generateVerificationCode();
          codeExpiry = Date.now() + 5 * 60 * 1000;

          await sendVerificationEmail(currentEmail, currentCode);
          showToast(`✅ تم إعادة إرسال رمز التحقق إلى ${currentEmail}`);
          
          // تفريغ حقول الكود
          codeInputs.forEach((id) => {
            document.getElementById(id).value = "";
          });
          document.getElementById("code1").focus();
        } catch (error) {
          showToast("❌ " + error.message, true);
        } finally {
          setTimeout(() => {
            resendCode.style.pointerEvents = "auto";
            resendCode.style.opacity = "1";
          }, 30000);
        }
      });
    </script>
  </body>
</html>
